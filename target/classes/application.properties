# ── Nodo Central — modulo de administracion (CU-10) ──────────────
server.port=9090
spring.application.name=nodo-central

# ── Base de datos H2 (config maestra, persistida en archivo) ─────
spring.datasource.url=jdbc:h2:file:./data/central;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Consola web de H2 para inspeccionar datos: http://localhost:9090/h2
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# ── Sincronizacion hacia los nodos FOG ──────────────────────────
# Timeout (ms) al intentar contactar un nodo FOG. Si no responde,
# se marca OFFLINE y se omite (CU-10 opera solo con conectividad).
central.sync.timeout-ms=2000
